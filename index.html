<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>오늘 할 일 ✓</title>
  <style>
    :root {
      --bg1: #6a8dff;
      --bg2: #8f5cff;
      --card: #ffffff;
      --text: #1f2440;
      --muted: #8a90a8;
      --line: #eef0f6;
      --accent: #6a8dff;
      --danger: #ff5c7a;
      --done: #b6bccd;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: "Pretendard", "맑은 고딕", "Apple SD Gothic Neo", "Segoe UI", sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: flex-start;
      justify-content: center;
      padding: 48px 16px;
      background: linear-gradient(135deg, var(--bg1), var(--bg2));
      color: var(--text);
    }
    .app {
      width: 100%;
      max-width: 460px;
      background: var(--card);
      border-radius: 20px;
      box-shadow: 0 24px 60px rgba(40, 30, 90, 0.28);
      overflow: hidden;
    }
    header {
      padding: 28px 28px 22px;
      background: linear-gradient(135deg, var(--bg1), var(--bg2));
      color: #fff;
    }
    header h1 { font-size: 24px; font-weight: 800; letter-spacing: -0.5px; }
    header p { margin-top: 6px; font-size: 13px; opacity: 0.85; }
    .input-row {
      display: flex;
      gap: 8px;
      padding: 20px 24px 12px;
    }
    #taskInput {
      flex: 1;
      border: 2px solid var(--line);
      border-radius: 12px;
      padding: 13px 14px;
      font-size: 15px;
      outline: none;
      transition: border-color 0.15s;
      font-family: inherit;
    }
    #taskInput:focus { border-color: var(--accent); }
    #addBtn {
      border: none;
      background: var(--accent);
      color: #fff;
      font-size: 15px;
      font-weight: 700;
      padding: 0 20px;
      border-radius: 12px;
      cursor: pointer;
      transition: transform 0.08s, opacity 0.15s;
    }
    #addBtn:hover { opacity: 0.9; }
    #addBtn:active { transform: scale(0.96); }
    .filters {
      display: flex;
      gap: 6px;
      padding: 4px 24px 8px;
    }
    .filter {
      border: none;
      background: transparent;
      color: var(--muted);
      font-size: 13px;
      font-weight: 600;
      padding: 7px 13px;
      border-radius: 20px;
      cursor: pointer;
      font-family: inherit;
    }
    .filter.active { background: #eef1ff; color: var(--accent); }
    ul#list { list-style: none; padding: 4px 12px; min-height: 80px; }
    li.task {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 13px 12px;
      border-radius: 12px;
      transition: background 0.12s;
    }
    li.task:hover { background: #f7f8fc; }
    li.task + li.task { border-top: 1px solid var(--line); }
    .check {
      width: 22px; height: 22px;
      border: 2px solid #cfd4e6;
      border-radius: 7px;
      cursor: pointer;
      flex-shrink: 0;
      display: grid;
      place-items: center;
      transition: all 0.15s;
    }
    .check.on { background: var(--accent); border-color: var(--accent); }
    .check.on::after { content: "✓"; color: #fff; font-size: 13px; font-weight: 900; }
    .label { flex: 1; font-size: 15px; word-break: break-all; cursor: pointer; }
    li.task.completed .label { color: var(--done); text-decoration: line-through; }
    .del {
      border: none; background: transparent;
      color: #cfd4e6; font-size: 20px; cursor: pointer;
      padding: 2px 6px; border-radius: 8px; line-height: 1;
      transition: color 0.15s, background 0.15s;
    }
    .del:hover { color: var(--danger); background: #fff0f3; }
    .empty { text-align: center; color: var(--muted); font-size: 14px; padding: 30px 0; }
    footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 24px 22px;
      font-size: 13px;
      color: var(--muted);
      border-top: 1px solid var(--line);
    }
    #clearDone {
      border: none; background: transparent;
      color: var(--muted); font-size: 13px; cursor: pointer;
      font-family: inherit; text-decoration: underline;
    }
    #clearDone:hover { color: var(--danger); }
  </style>
</head>
<body>
  <main class="app">
    <header>
      <h1>오늘 할 일 ✓</h1>
      <p>해야 할 일을 적고, 하나씩 지워나가요.</p>
    </header>

    <div class="input-row">
      <input id="taskInput" type="text" placeholder="할 일을 입력하세요" maxlength="80" autocomplete="off" />
      <button id="addBtn">추가</button>
    </div>

    <div class="filters">
      <button class="filter active" data-filter="all">전체</button>
      <button class="filter" data-filter="active">진행 중</button>
      <button class="filter" data-filter="done">완료</button>
    </div>

    <ul id="list"></ul>

    <footer>
      <span id="count">0개 남음</span>
      <button id="clearDone">완료 항목 지우기</button>
    </footer>
  </main>

  <script>
    const KEY = "todo.tasks.v1";
    let tasks = JSON.parse(localStorage.getItem(KEY) || "[]");
    let filter = "all";

    const $list = document.getElementById("list");
    const $input = document.getElementById("taskInput");
    const $count = document.getElementById("count");

    function save() { localStorage.setItem(KEY, JSON.stringify(tasks)); }

    function addTask() {
      const text = $input.value.trim();
      if (!text) return;
      tasks.unshift({ id: Date.now(), text, done: false });
      $input.value = "";
      save(); render();
    }

    function toggle(id) {
      const t = tasks.find(t => t.id === id);
      if (t) t.done = !t.done;
      save(); render();
    }

    function remove(id) {
      tasks = tasks.filter(t => t.id !== id);
      save(); render();
    }

    function clearDone() {
      tasks = tasks.filter(t => !t.done);
      save(); render();
    }

    function render() {
      const shown = tasks.filter(t =>
        filter === "all" ? true : filter === "done" ? t.done : !t.done
      );

      $list.innerHTML = "";
      if (shown.length === 0) {
        const li = document.createElement("li");
        li.className = "empty";
        li.textContent = filter === "done"
          ? "완료한 일이 아직 없어요."
          : tasks.length === 0
            ? "할 일을 추가해 보세요 🙂"
            : "표시할 일이 없어요.";
        $list.appendChild(li);
      } else {
        shown.forEach(t => {
          const li = document.createElement("li");
          li.className = "task" + (t.done ? " completed" : "");

          const check = document.createElement("div");
          check.className = "check" + (t.done ? " on" : "");
          check.onclick = () => toggle(t.id);

          const label = document.createElement("span");
          label.className = "label";
          label.textContent = t.text;
          label.onclick = () => toggle(t.id);

          const del = document.createElement("button");
          del.className = "del";
          del.innerHTML = "&times;";
          del.title = "삭제";
          del.onclick = () => remove(t.id);

          li.append(check, label, del);
          $list.appendChild(li);
        });
      }

      const left = tasks.filter(t => !t.done).length;
      $count.textContent = left + "개 남음";
    }

    document.getElementById("addBtn").onclick = addTask;
    document.getElementById("clearDone").onclick = clearDone;
    $input.addEventListener("keydown", e => { if (e.key === "Enter") addTask(); });
    document.querySelectorAll(".filter").forEach(btn => {
      btn.onclick = () => {
        filter = btn.dataset.filter;
        document.querySelectorAll(".filter").forEach(b => b.classList.remove("active"));
        btn.classList.add("active");
        render();
      };
    });

    render();
  </script>
</body>
</html>
